name: Release library

# Release = a Git tag `vX.Y.Z`. The version is derived from the tag name (leading
# `v` stripped) and passed via -Drevision=X.Y.Z so Maven 4 resolves ${revision}
# in all module POMs and writes fully-resolved Consumer POMs. The default
# <revision> in pom.xml is NOT changed. Snapshots keep running via
# build-and-deploy.yml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release-Version, z. B. 0.1.0 (ohne führendes v)'
        required: true

jobs:
  release:
    runs-on: main
    container:
      image: registry.cg.internal/ci/rdf-maven:latest
      volumes:
        - /var/cache/maven-repo:/root/.m2/repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Maven credentials
        run: |
          cat > /tmp/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>forgejo-kogn-io</id>
                <username>${MAVEN_REGISTRY_USER}</username>
                <password>${MAVEN_REGISTRY_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          MAVEN_REGISTRY_USER: ${{ secrets.MAVEN_REGISTRY_USER }}
          MAVEN_REGISTRY_TOKEN: ${{ secrets.MAVEN_REGISTRY_TOKEN }}

      - name: Build, test and deploy release
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ forgejo.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "Releasing $VERSION"
          ./mvnw -B --no-transfer-progress -T 2C -s /tmp/settings.xml \
            -Drevision="$VERSION" deploy
