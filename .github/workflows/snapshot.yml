name: Deploy snapshot to Central

# Snapshot pipeline for the io.kogn.rdf OSS vertical. On push to main the job
# builds, tests and deploys the module artifacts (rdf-terms, rdf-dataset,
# rdf-dataset-rdf4j, rdf-shacl, rdf-shacl-rdf4j) + parent POM as SNAPSHOT
# (default ${revision} = 0.0.1-SNAPSHOT) to the Sonatype Central Portal snapshot
# repository. Pull requests and other branches only build + test (no deploy).
#
# The Central snapshot repo does not require signatures, so no GPG here — plain
# `deploy` targets the <snapshotRepository id=central> from the POM's
# distributionManagement. Credentials come from the `central` <server>.
#
# Required repository secrets:
#   CENTRAL_TOKEN_USERNAME / CENTRAL_TOKEN_PASSWORD  Sonatype Central portal token

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Least privilege, pinned rather than inherited: the job only reads the code —
# the Central credentials come from secrets, not from GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD

      # Deploy only from the canonical repo's main branch. Forks that push to
      # their own main (workflow copy, no secrets) skip this and just build.
      - name: Build, test and deploy snapshot (main → Central)
        if: github.ref_name == 'main' && github.repository == 'kogn-io/rdf-core'
        run: ./mvnw -B --no-transfer-progress -T 2C deploy
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}

      - name: Build and test (PRs / other branches / forks)
        if: ${{ !(github.ref_name == 'main' && github.repository == 'kogn-io/rdf-core') }}
        run: ./mvnw -B --no-transfer-progress -T 2C verify
