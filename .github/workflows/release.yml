name: Release to Maven Central

# Release = a Git tag `vX.Y.Z`. The version is derived from the tag name (leading
# `v` stripped) and passed via -Drevision=X.Y.Z so Maven 4 resolves ${revision}
# in all module POMs and writes fully-resolved consumer POMs. The default
# <revision> in pom.xml is NOT changed; snapshots keep running via snapshot.yml.
#
# The `central-release` profile signs the artifacts (GPG) and uploads a bundle to
# the Sonatype Central Portal. autoPublish=false (see pom.xml): the bundle is
# validated, then "Publish" is confirmed manually in the Central portal.
#
# Required repository secrets:
#   CENTRAL_TOKEN_USERNAME / CENTRAL_TOKEN_PASSWORD  Sonatype Central portal token
#   GPG_PRIVATE_KEY                                  ASCII-armored private key export
#   GPG_PASSPHRASE                                   passphrase for that key

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 0.1.0 (no leading v)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve release version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Build, sign and publish to Central
        run: >
          ./mvnw -B --no-transfer-progress -T 2C
          -Pcentral-release
          -Drevision=${{ steps.version.outputs.value }}
          -Dgpg.pinentryMode=loopback
          deploy
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
